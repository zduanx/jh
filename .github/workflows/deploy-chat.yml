name: Deploy Chat

# Phase 9E: Continuous Deployment for the chat stack (Node Lambda + Function URL).
# On merge to main, deploy via `terraform apply` — OIDC auth (no stored keys), gated
# by the `production-chat` environment, then smoke-test /health. Reuses the same
# Terraform the local `jpushchat` runs. Chat packages via archive_file (no Docker).
on:
  push:
    branches: [main]
    paths:
      - "chat/**"
      - ".github/workflows/deploy-chat.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: terraform apply (chat)
    runs-on: ubuntu-latest
    environment: production-chat # gate: required reviewer pauses the job for approval
    defaults:
      run:
        working-directory: chat/terraform
    env:
      # chat's 6 secrets (from chat/deploy.config.json), via GitHub Secrets.
      TF_VAR_secret_key: ${{ secrets.TF_VAR_SECRET_KEY }}
      TF_VAR_anthropic_api_key: ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
      TF_VAR_mcp_service_token: ${{ secrets.TF_VAR_MCP_SERVICE_TOKEN }}
      TF_VAR_mcp_server_url: ${{ secrets.TF_VAR_MCP_SERVER_URL }}
      TF_VAR_upstash_redis_rest_url: ${{ secrets.TF_VAR_UPSTASH_REDIS_REST_URL }}
      TF_VAR_upstash_redis_rest_token: ${{ secrets.TF_VAR_UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # The chat Lambda is packaged from source_dir, which INCLUDES node_modules.
      # The runner is clean (no node_modules), so we must install prod deps here —
      # otherwise the zip ships without jsonwebtoken etc. and the Lambda crashes at
      # import (this is the "works locally, fails in clean CI" packaging trap).
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install chat production dependencies
        working-directory: chat
        run: npm ci --omit=dev

      - name: Configure AWS credentials (OIDC, keyless)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::400778305315:role/jh-github-actions-cd
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Smoke test (Lambda alive + auth gate)
        run: |
          URL="$(terraform output -raw chat_function_url)"
          URL="${URL%/}" # strip any trailing slash
          # The chat Lambda auth-gates ALL requests (handler.js verifies the JWT before
          # anything — there's no public /health). So a 401 to an UNauthenticated request
          # is the healthy signal: it proves the Lambda is up AND fail-closed auth works.
          # (A 200 would actually be wrong — it'd mean auth was bypassed.)
          echo "Smoke-testing $URL/ (expect 401 — alive + auth gate working)"
          for i in 1 2 3 4 5; do
            code="$(curl -s -o /dev/null -w '%{http_code}' "$URL/" || echo 000)"
            if [ "$code" = "401" ]; then echo "✓ chat alive, auth gate returns 401"; exit 0; fi
            echo "  attempt $i: $code — retrying in 5s"; sleep 5
          done
          echo "✗ /health did not return 200 — deploy is unhealthy"
          echo "  Rollback: git revert the offending commit on main → CD re-applies the prior code."
          exit 1
