AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Streaming chat service (Node.js) for Job Hunt Tracker

# GENERATED by chat/scripts/generate_template.py from chat/.sam-config.
# DO NOT hand-edit — edit chat/.sam-config and run the generator (or jpushchat).
#
# Own stack (jh-chat-stack), separate from the Python backend:
# different runtime, Function URL + RESPONSE_STREAM, independent lifecycle.
# See ADR-025 (runtime) and ADR-030 (topology).

Parameters:
  AllowedOrigins:
    Type: CommaDelimitedList
    Description: CORS allowed origins for the chat Function URL
    Default: "http://localhost:3000,https://zduan-job.vercel.app"
  JWTSecretKey:
    Type: String
    Description: Secret key for JWT signing (shared with backend)
    NoEcho: true
  UpstashRedisRestUrl:
    Type: String
    Description: Upstash Redis REST endpoint
    NoEcho: false
  UpstashRedisRestToken:
    Type: String
    Description: Upstash Redis REST auth token
    NoEcho: true
  McpServerUrl:
    Type: String
    Description: Base URL of the MCP server (Function URL in prod)
    NoEcho: false
  McpServiceToken:
    Type: String
    Description: Shared service token for MCP server auth (matches backend)
    NoEcho: true
  AnthropicApiKey:
    Type: String
    Description: Anthropic API key for the chat agent (Claude)
    NoEcho: true

Resources:
  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: JobHuntChat
      CodeUri: .
      Handler: handler.handler
      Runtime: nodejs22.x
      Timeout: 300
      MemorySize: 256
      Description: Streaming chat service (Node.js) for Job Hunt Tracker
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins: !Ref AllowedOrigins
          AllowMethods:
            - POST
            - GET
          AllowHeaders:
            - "*"
      Environment:
        Variables:
          ALGORITHM: HS256
          SECRET_KEY: !Ref JWTSecretKey
          UPSTASH_REDIS_REST_URL: !Ref UpstashRedisRestUrl
          UPSTASH_REDIS_REST_TOKEN: !Ref UpstashRedisRestToken
          MCP_SERVER_URL: !Ref McpServerUrl
          MCP_SERVICE_TOKEN: !Ref McpServiceToken
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey

Outputs:
  ChatFunctionUrl:
    Description: Chat streaming Function URL (set CHAT_AWS_URL to this for jchat-test --aws)
    Value: !GetAtt ChatFunctionUrl.FunctionUrl

  ChatFunctionName:
    Description: Chat Lambda function name
    Value: !Ref ChatFunction
