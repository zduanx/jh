[pytest]
# Make backend/ the import root so `from main import app`, `from config...`, etc.
# resolve regardless of where pytest is invoked from (locally we run inside backend/;
# CI's rootdir differs, which otherwise breaks bare top-level imports).
pythonpath = .

# Registered markers (avoids "unknown marker" warnings).
markers =
    manual: inspection-only tests that persist data for local psql debugging
            (NOT assertions). CI skips them via `pytest -m "not manual"`.

# Only collect real test files under __tests__/ (excludes manual scripts like
# auth/__tests__/test_auth.py and sourcing/__tests__/test_sourcing.py which are
# standalone __main__ scripts, not pytest tests).
python_files = test_*.py
testpaths =
    api auth db extractor_agent extractors mcp_server sourcing utils workers
